# -- Arb detection & alerting filters, per market type --------------
# Tiers are percentage spreads (net of fees) that route the signal
# to a specific Telegram forum topic. Gaps between tiers are allowed
# (signals that fall through any `from_pct..to_pct` band are silenced).
filters:
  spot:
    min_profit_pct: 3.0            # below this net% we don't even dedup
    cooldown_seconds: 180          # same (symbol, buy, sell) only every N s
    info_topic_id: null            # health/heartbeat/errors land here
    tiers:
      low:  { from_pct: 3.0,  to_pct: 5.0,   topic_id: null }
      mid:  { from_pct: 5.0,  to_pct: 10.0,  topic_id: null }
      high: { from_pct: 10.0, to_pct: 999.0, topic_id: null }
  perp:
    min_profit_pct: 0.5
    cooldown_seconds: 180
    info_topic_id: null
    tiers:
      low:  { from_pct: 0.5, to_pct: 1.0,   topic_id: null }
      mid:  { from_pct: 1.0, to_pct: 3.0,   topic_id: null }
      high: { from_pct: 3.0, to_pct: 999.0, topic_id: null }

# -- Per-exchange taker fees (fractions, NOT percent) ---------------
# 0.001 == 0.10%. Verify against your VIP tier / fee-in-native-token
# settings on each venue before trusting these numbers.
fees:
  spot:
    binance: 0.001
    bybit:   0.001
    gateio:  0.002
    bitget:  0.001
    kucoin:  0.001
    bingx:   0.002
    mexc:    0.0
  perp:
    binance: 0.0004
    bybit:   0.00055
    gateio:  0.0005
    bitget:  0.0006
    kucoin:  0.0006
    bingx:   0.0005
    mexc:    0.0002

# -- Per-venue coverage map (optional) ------------------------------
# When non-empty, each listener subscribes only to the symbols whose
# venue list explicitly names it. This is the output of
# ``python scripts/discover_universe.py`` — a hybrid REST + WS-verify
# discovery that drops (venue, symbol) pairs the venue lists in REST
# but never streams via WS bookTicker. That mismatch was the root
# cause of the heartbeat-evict log spam at universe-100 (~66k WARN /
# 30 min); with a populated coverage map those subscriptions never
# happen in the first place.
#
# Schema:
#   coverage:
#     spot:
#       BTCUSDT: [binance, bybit, gateio, bitget, kucoin, bingx, mexc]
#       SNEKUSDT: [bybit, kucoin]   # MEXC dropped — REST listed but WS silent
#       ...
#     perp:
#       BTCUSDT: [binance-perp, bybit-perp, gateio-perp, ...]
#       ...
#
# Each entry must list >= 2 venues (arbitrage requires a comparison).
# Spot venues are bare names, perp venues use the ``-perp`` suffix.
# Leave both maps empty (or omit the section entirely) to fall back
# to the legacy behaviour where every venue subscribes to every symbol
# in ``symbols.spot`` / ``symbols.perp``.
coverage:
  spot: {}
  perp: {}

# -- Tick freshness & reconnect behaviour ---------------------------
limits:
  max_age_ms: 500                  # stale ticks ignored by comparator
  heartbeat_interval_ms: 1000      # how often heartbeat task runs
  heartbeat_timeout_ms: 3000       # after this, evict the exchange entry
  backoff_max_s: 60.0              # reconnect cap for exponential backoff
  backoff_jitter_s: 1.0            # random seconds added on top

# -- Telegram output ------------------------------------------------
# `enabled: false` means signals are still detected & logged, but
# nothing is sent to Telegram. Token lives in `.env`, not here.
#
# Setup:
#   1. Create a bot via @BotFather, copy the token into .env as
#      TELEGRAM_BOT_TOKEN.
#   2. Create two supergroups (one for spot, one for perp), enable
#      Topics on each, add the bot as admin.
#   3. In each group create 4 topics: low / mid / high / info.
#   4. Fill in the chat_ids below (they look like -1001234567890)
#      and the 4 topic_ids per market under
#      filters.{market}.tiers.*.topic_id and filters.{market}.info_topic_id.
#
# To get chat_id and topic_ids: DM the bot, open
#   https://api.telegram.org/bot<TOKEN>/getUpdates
# and read `chat.id` / `message_thread_id` from the response.
telegram:
  enabled: false
  spot_chat_id: null               # e.g. -1001234567890 (with -100 prefix)
  perp_chat_id: null

# -- Paper trading (simulation only, no real orders) ----------------
# Spot: instant-close model (buy on A, sell on B at the same moment,
#       pay two taker fees + a small slippage haircut).
# Perp: open long on cheap venue + short on expensive venue, wait
#       for the spread to collapse below `close_threshold_pct`.
#       Force-close after `max_hold_seconds` if it never reverts.
# Closed trades are appended to `paper_closed.jsonl`; opens (perp
# only) are tracked in `paper_open.jsonl`. Every close also emits
# a Telegram info-topic notice with the net PnL.
paper_trading:
  enabled: false
  open_path: "data/paper_open.jsonl"
  closed_path: "data/paper_closed.jsonl"
  spot:
    notional_per_leg_usd: 50.0     # $50 per leg -> $100 notional total
    slippage_pct: 0.05             # assumed slippage per side, in percent
  perp:
    notional_per_leg_usd: 50.0
    close_threshold_pct: 0.5       # close when spread drops below this
    max_hold_seconds: 86400        # force-close after 24h
    slippage_pct: 0.03             # haircut on each exit leg, in percent
    poll_interval_s: 1.0           # how often to check open positions

# -- Persistence ----------------------------------------------------
# `signals.jsonl` = append-only log of every detected arbitrage
# signal (JSON Lines). Useful for `grep` / `jq` analysis and as the
# corpus for future backtest / paper-trading replays.
# Example analysis:
#   tail -f data/signals.jsonl
#   jq 'select(.net_pct > 5)' data/signals.jsonl
#   jq -s 'group_by(.symbol) | map({sym:.[0].symbol, cnt:length})' data/signals.jsonl
persistence:
  enabled: true
  signals_path: "data/signals.jsonl"
  # Binary append-only tick log used by `python -m arbitrage.replay`
  # for backtests / parameter tuning. Off by default — at 7 venues x
  # 2 markets traffic this is ~250 MB / day after zstd compression
  # (~1 GB / day raw). Enable when you want a replay corpus.
  tick_storage:
    enabled: false
    root: "data/ticks"
    compress: true                # rotate-and-zstd-compress old daily files
    retention_days: 7             # delete files older than this

# -- Prometheus metrics ---------------------------------------------
# Exposes /metrics on a HTTP port that Prometheus can scrape (the
# repo ships a `monitoring/grafana_dashboard.json` and a
# `monitoring/docker-compose.yml` to get from zero to a dashboard
# in ~5 minutes — see GUIDE.ru.md).
#
# Off by default: enabling on a public-facing host leaks the symbol
# universe and venue line-up (cardinality of `arb_signals_total`).
# Bind to 127.0.0.1 unless you've put a firewall in front of the
# scrape endpoint.
metrics:
  enabled: false
  port: 9090
  bind_addr: "127.0.0.1"
