# Arbitrage scanner settings.
#
# To use: copy this file to `settings.yaml` in the repo root and edit.
# `settings.yaml` is git-ignored so your local edits stay local.
# If `settings.yaml` is missing the scanner falls back to this example,
# which is why the defaults are conservative and everything Telegram-y
# is disabled out of the box.
#
# Secrets (bot tokens, API keys) never live here — put them in `.env`.

# -- Which symbols to track, per market type ------------------------
#
# These two lists are the **default ~100-pair universe** that
# ``scripts/discover_universe.py`` produced (see ``docs/universe-100.md``
# for the methodology and the per-venue coverage matrix). The lists
# differ between spot and perp because cross-listing isn't symmetric:
# some assets only trade as perp (XMR, XAUT) and some only as spot
# (FILUSDT, COMPUSDT).
#
# **Cardinality + load** (assuming you keep both lists at ~100):
# * ``arb_signals_total{market,symbol,buy_ex,sell_ex}``: ~9.8k series
#   per market. Prometheus is fine with this; Grafana panels stay
#   responsive.
# * MEXC enforces 30 streams/connection so ``run_mexc`` shards across
#   four parallel WS connections under the hood (transparent).
# * Bybit caps ``op:subscribe`` args at 10/message so the spot listener
#   sends 10 sub messages on connect (also transparent).
#
# To shrink: edit your local ``settings.yaml`` (this example never
# gets edited in-place — it's the fallback).
